name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chip: [STM32F407VG, STM32F401CE, STM32F411CE]

    steps:
      - uses: actions/checkout@v4

      - name: Install ARM toolchain
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: '13.2.Rel1'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install stmtool
        run: pip install ./tools/stmtool

      - name: Create test project
        run: stmtool project create ci-test --chip ${{ matrix.chip }}
        env:
          STMSDK_PATH: ${{ github.workspace }}

      - name: Build
        run: |
          cd ci-test
          stmtool build --native
        env:
          STMSDK_PATH: ${{ github.workspace }}

      - name: Binary size
        run: arm-none-eabi-size ci-test/build/ci-test.elf
