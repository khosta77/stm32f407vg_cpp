name: Docs

on:
  push:
    branches: [develop]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'tools/docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: tools/docs/requirements.txt

      - name: Install MkDocs and plugins
        run: pip install -r tools/docs/requirements.txt

      - name: Build site (sanity check)
        run: mkdocs build --strict

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force --clean --remote-branch gh-pages
